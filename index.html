<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReefMC</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<nav class="rmc-nav">
  <a class="rmc-nav-logo" href="index.html">
    <img class="rmc-nav-logo-img" src="reefmc-logo.png" alt="ReefMC">
  </a>
  <div class="rmc-nav-links">
    <a href="index.html" class="rmc-active">Home</a>
    <a href="rules.html">Rules</a>
    <a href="voting.html">Voting</a>
    <a href="store.html">Store</a>
  </div>
</nav>
<section class="rmc-hero">
  <div class="rmc-hero-bg"></div>
  <div class="rmc-hero-shade"></div>
  <div class="rmc-hero-content">
    <button class="rmc-hero-stat rmc-hero-stat-left rmc-hero-stat-btn" onclick="rmcCopyIPModal()" type="button">
      <div class="rmc-hero-stat-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      </div>
      <div class="rmc-hero-stat-text">
        <div class="rmc-hero-stat-num" id="rmc-player-count">-- ONLINE</div>
        <div class="rmc-hero-stat-sub">PLAY.REEFMC.FUN</div>
      </div>
    </button>
    <div class="rmc-hero-logo-block">
      <img class="rmc-logo-hero-img" src="reefmc-logo.png" alt="ReefMC">
      <p class="rmc-hero-sub">Minecraft Network</p>
    </div>
    <a class="rmc-hero-stat rmc-hero-stat-right" href="https://discord.gg/reefmc" target="_blank" rel="noopener">
      <div class="rmc-hero-stat-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M20.3 4.4A17.6 17.6 0 0 0 15.9 3l-.3.6a13 13 0 0 1 3.7 1.4 14.5 14.5 0 0 0-12.6 0A13 13 0 0 1 10.4 3l-.3-.6a17.6 17.6 0 0 0-4.4 1.4C3 8.9 2.2 13.3 2.6 17.6a17.7 17.7 0 0 0 5.4 2.7l.7-1.1a11.4 11.4 0 0 1-1.9-.9l.5-.4a12.7 12.7 0 0 0 10.5 0l.5.4a11.4 11.4 0 0 1-1.9.9l.7 1.1a17.6 17.6 0 0 0 5.4-2.7c.5-5-.7-9.3-2.2-13.2zM9 14.7c-.8 0-1.5-.8-1.5-1.7S8.1 11.2 9 11.2s1.5.8 1.5 1.8-.7 1.7-1.5 1.7zm6 0c-.8 0-1.5-.8-1.5-1.7s.6-1.8 1.5-1.8 1.5.8 1.5 1.8-.7 1.7-1.5 1.7z"/></svg>
      </div>
      <div class="rmc-hero-stat-text">
        <div class="rmc-hero-stat-num">JOIN US</div>
        <div class="rmc-hero-stat-sub">DISCORD.GG/REEFMC</div>
      </div>
    </a>
  </div>
</section>

<div class="rmc-modal-overlay" id="rmc-modal-overlay">
  <div class="rmc-modal-card">
    <div class="rmc-modal-check">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
    </div>
    <p class="rmc-modal-title">IP Copied!</p>
    <p class="rmc-modal-sub">Now go join the server!</p>
    <button class="rmc-modal-close-btn" onclick="rmcCloseModal()" type="button">Close</button>
  </div>
</div>
<div class="rmc-intro-panel">
  <h1>Welcome to ReefMC</h1>
  <p class="rmc-tag">Join our Minecraft community today!</p>
  <div class="rmc-ip-row">
    <span class="rmc-ip" id="rmc-ip-text">play.reefmc.fun</span>
    <button class="rmc-copy-btn" id="rmc-copy-btn" onclick="rmcCopyIP()">Copy</button>
  </div>
  <div class="rmc-btn-row">
    <a class="rmc-btn rmc-btn-primary" href="https://discord.gg/reefmc" target="_blank" rel="noopener">Join Discord</a>
    <a class="rmc-btn rmc-btn-accent" href="https://store.reefmc.fun" target="_blank" rel="noopener">Visit Store</a>
  </div>
</div>
<footer class="rmc-footer">
  <div>ReefMC</div>
  <div>
    <a href="https://discord.gg/reefmc" target="_blank" rel="noopener">Discord</a>
    <span class="rmc-footer-dot">&middot;</span>
    <a href="https://store.reefmc.fun" target="_blank" rel="noopener">Store</a>
    <span class="rmc-footer-dot">&middot;</span>
    <span>play.reefmc.fun</span>
  </div>
</footer>
<script src="script.js"></script>
</body>
</html>
